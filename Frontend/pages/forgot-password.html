<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNCPAGO — Recuperar contraseña</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="auth-screen">
  <div class="auth-inner">

    <div class="auth-logo">SYNC<span>PAGO</span></div>

    <div class="auth-card">
      <h2>Recuperar contraseña</h2>

      <!-- RF-003 -->
      <div class="info-box">
        📧 Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.
      </div>

      <div class="field-group" id="fg-email">
        <span class="icon">✉</span>
        <input type="email" id="email" placeholder="Correo electrónico">
        <p class="field-error">Ingresa un correo válido.</p>
      </div>

      <button class="btn-primary" onclick="handleForgot()">Enviar enlace</button>

      <!-- Mensaje de éxito (oculto por defecto) -->
      <div id="success-msg" class="hidden" style="
        margin-top: 14px;
        background: #dcfce7;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 0.85rem;
        color: #16a34a;
        text-align: center;
      ">
        ✅ Enlace enviado. Revisa tu bandeja de entrada.
      </div>
    </div>

    <div class="auth-link">
      <a href="index.html">← Volver al inicio de sesión</a>
    </div>

  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  function handleForgot() {
    const email = document.getElementById('email');
    const fg    = document.getElementById('fg-email');

    if (!email.value.includes('@')) {
      fg.classList.add('error');
      return;
    }
    fg.classList.remove('error');

    // RF-003: llamada a auth.js → forgotPassword(email)
    forgotPassword(email.value);
    document.getElementById('success-msg').classList.remove('hidden');
  }
</script>

</body>
</html>
