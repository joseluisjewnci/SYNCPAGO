<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNCPAGO — Historial</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="app-layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">SYNC<span>PAGO</span></div>
    <div class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">🏠 Inicio</a>
      <a class="nav-item" href="gastos.html">📋 Mis Recibos</a>
      <a class="nav-item" href="recordatorios.html">🔔 Recordatorios</a>
      <a class="nav-item" href="insights.html">📊 Estadísticas</a>
      <a class="nav-item active" href="historial.html">🕓 Historial</a>
    </div>
    <button class="nav-btn-add" onclick="window.location.href='gastos.html'">+ Agregar Recibo</button>
  </nav>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <!-- RF-021 -->
        <input type="text" placeholder="Buscar en historial..." id="hist-search" oninput="filterHistorial()">
      </div>
      <div class="topbar-right">
        <button class="notif-btn">🔔</button>
       <div class="user-menu" onclick="toggleDropdown()">
    <div class="avatar">👤</div>

    <span id="username-display">Usuario</span> ▾

    <div class="user-dropdown" id="user-dropdown">
        <div class="dd-header">
            <div class="dd-avatar">👤</div>

            <div class="dd-name" id="fullname-display">
                Usuario
            </div>

            <div class="dd-email" id="email-display"></div>
        </div>

        <div class="dd-item logout" onclick="logout()">
            ↩ Cerrar sesión
        </div>
    </div>
</div>
    </header>

    <main class="content">

      <div class="page-header">
        <h2>Historial</h2>
        <p>Consulta el historial completo de tus recibos registrados.</p>
      </div>

      <!-- RF-021: Filtros avanzados -->
      <div class="table-toolbar">
        <!-- Filtro por estado -->
        <select class="filter-btn" id="hist-status" onchange="filterHistorial()" style="padding:7px 14px;appearance:none;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;color:var(--gray-700);background:white;">
          <option value="">Todos los estados</option>
          <option value="Pagado">✅ Pagado</option>
          <option value="Pendiente">⏳ Pendiente</option>
          <option value="Vencido">⚠️ Vencido</option>
          <option value="Eliminado">🗑 Eliminado</option>
        </select>

        <!-- Filtro por categoría -->
        <select class="filter-btn" id="hist-cat" onchange="filterHistorial()" style="padding:7px 14px;appearance:none;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;color:var(--gray-700);background:white;">
          <option value="">Todas las categorías</option>
          <option>Vivienda</option>
          <option>Servicios</option>
          <option>Salud</option>
          <option>Educación</option>
          <option>Ocio</option>
          <option>Impuestos</option>
        </select>

        <!-- RF-021: filtro por rango de fechas -->
        <input type="date" id="hist-from"
          style="padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:0.82rem;color:var(--gray-700);background:white;"
          onchange="filterHistorial()" title="Desde">
        <input type="date" id="hist-to"
          style="padding:7px 10px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:0.82rem;color:var(--gray-700);background:white;"
          onchange="filterHistorial()" title="Hasta">

        <div class="search-input-wrap">
          <span style="color:var(--gray-400);font-size:0.85rem">🔍</span>
          <input type="text" placeholder="Buscar..." id="hist-q" oninput="filterHistorial()">
        </div>
      </div>

      <!-- RF-019: tabla de historial completo -->
      <table class="data-table">
        <thead>
          <tr>
            <th>Empresa/Servicio</th>
            <th>Categoría</th>
            <th>Monto</th>
            <th>Fecha de vencimiento</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="hist-tbody">
        </tbody>
      </table>

      <div class="pagination">

  <span id="hist-pag-info">
    Página 1 de 1
  </span>

  <div class="page-btns">

    <button
      class="page-btn"
      id="hist-prev"
      disabled>
      Anterior
    </button>

    <span
      class="page-info"
      id="hist-pag-num">
      1 de 1
    </span>

    <button
      class="page-btn"
      id="hist-next">
      Siguiente
    </button>

  </div>

</div>

    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/historial.js"></script>
<script>
  requireAuth();


  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
  function toggleDropdown() {
    document.getElementById('user-dropdown').classList.toggle('open');
  }
</script>
</body>
</html>
